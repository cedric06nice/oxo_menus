name: CI (Analyze + Test)

on:
  workflow_call:

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter
      - run: flutter test --coverage --reporter expanded
      - name: Check coverage threshold (75%)
        run: |
          COVERAGE=$(grep -o "LH:[0-9]*" coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          TOTAL=$(grep -o "LF:[0-9]*" coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          PCT=$(awk "BEGIN {printf \"%.2f\", ($COVERAGE/$TOTAL)*100}")
          echo "Coverage: $PCT%"
          if (( $(echo "$PCT < 75.0" | bc -l) )); then
            echo "::error::Coverage $PCT% is below 75% threshold"
            exit 1
          fi
