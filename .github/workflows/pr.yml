name: PR Pipeline

on:
  pull_request:
    branches: [prod]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    steps:
      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter test --coverage --reporter expanded
      - name: Check coverage threshold (75%)
        run: |
          COVERAGE=$(grep -o "LH:[0-9]*" coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          TOTAL=$(grep -o "LF:[0-9]*" coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          PCT=$(awk "BEGIN {printf \"%.2f\", ($COVERAGE/$TOTAL)*100}")
          echo "Coverage: $PCT%"
          if (( $(echo "$PCT < 75.0" | bc -l) )); then
            echo "::error::Coverage $PCT% is below 75% threshold"
            exit 1
          fi

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build web (dev Directus)
        run: flutter build web --release --dart-define=DIRECTUS_URL=${{ secrets.DIRECTUS_URL_DEV }}

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          tags: oxo-menus-pr-${{ github.event.pull_request.number }}:latest
          outputs: type=docker,dest=image.tar

      - name: Compress Docker image
        run: gzip image.tar -c > image.tar.gz

      - name: Copy image to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: image.tar.gz
          target: /tmp/

      - name: Copy deploy script to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/scripts/pr-deploy.sh
          target: /tmp/
          strip_components: 2

      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x /tmp/pr-deploy.sh
            /tmp/pr-deploy.sh ${{ github.event.pull_request.number }}
            rm /tmp/pr-deploy.sh /tmp/image.tar.gz

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = `https://pr-${prNumber}.oxo-menus.cedric06nice.com/`;
            const body = `Preview deployed: ${url}`;
            // Update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const botComment = comments.find(c => c.body.startsWith('Preview deployed:'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  build-ios:
    name: Build iOS (TestFlight)
    runs-on: macos-26
    needs: test
    if: contains(github.event.pull_request.labels.*.name, 'deploy-mobile')
    timeout-minutes: 45
    env:
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }} --dart-define=DIRECTUS_URL=${{ secrets.DIRECTUS_URL_DEV }}

      - name: Install CocoaPods dependencies
        run: bundle exec pod install
        working-directory: ios

      - name: Deploy to TestFlight
        run: bundle exec fastlane beta
        working-directory: ios

  build-macos:
    name: Build macOS (TestFlight)
    runs-on: macos-26
    needs: test
    if: contains(github.event.pull_request.labels.*.name, 'deploy-mobile')
    timeout-minutes: 45
    env:
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: macos

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Install certificates and provisioning profiles
        run: bundle exec fastlane install_profiles
        working-directory: macos

      - run: flutter build macos --release --build-number=${{ github.run_number }} --dart-define=DIRECTUS_URL=${{ secrets.DIRECTUS_URL_DEV }}

      - name: Install CocoaPods dependencies
        run: bundle exec pod install
        working-directory: macos

      - name: Deploy to TestFlight
        run: bundle exec fastlane beta
        working-directory: macos

  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    needs: test
    if: contains(github.event.pull_request.labels.*.name, 'deploy-mobile')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release --build-number=${{ github.run_number }} --dart-define=DIRECTUS_URL=${{ secrets.DIRECTUS_URL_DEV }}

      - uses: actions/upload-artifact@v5
        with:
          name: android-apk-pr-${{ github.event.pull_request.number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
