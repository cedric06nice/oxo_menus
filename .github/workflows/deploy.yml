name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter test --coverage --reporter expanded
      - name: Check coverage threshold (75%)
        run: |
          COVERAGE=$(grep -o "LH:[0-9]*" coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          TOTAL=$(grep -o "LF:[0-9]*" coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          PCT=$(awk "BEGIN {printf \"%.2f\", ($COVERAGE/$TOTAL)*100}")
          echo "Coverage: $PCT%"
          if (( $(echo "$PCT < 75.0" | bc -l) )); then
            echo "::error::Coverage $PCT% is below 75% threshold"
            exit 1
          fi

  deploy-web:
    name: Deploy Web → ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Set environment
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DIRECTUS_URL=https://api.oxo-menus.cedric06nice.com" >> $GITHUB_ENV
            echo "IMAGE_NAME=oxo-menus-prod" >> $GITHUB_ENV
          else
            echo "DIRECTUS_URL=https://api.oxo-menus-dev.cedric06nice.com" >> $GITHUB_ENV
            echo "IMAGE_NAME=oxo-menus-staging" >> $GITHUB_ENV
          fi

      - name: Build web
        run: flutter build web --release --dart-define=DIRECTUS_URL=${{ env.DIRECTUS_URL }}

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          outputs: type=docker,dest=image.tar

      - name: Compress Docker image
        run: gzip image.tar -c > image.tar.gz

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: image.tar.gz
          target: /tmp/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker load < /tmp/image.tar.gz
            cd ~/oxo-menus
            docker compose up -d --no-deps ${{ env.IMAGE_NAME }}
            rm /tmp/image.tar.gz
            echo "Deployed ${{ env.IMAGE_NAME }}:${{ github.sha }}"

  sync-schema:
    name: Sync Directus schema dev → prod
    runs-on: ubuntu-latest
    needs: deploy-web
    if: github.ref_name == 'main'
    steps:
      - name: Export dev schema and apply to prod
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Exporting schema from Directus dev ==="
            docker exec oxo-directus-dev npx directus schema snapshot /tmp/schema-snapshot.yaml --yes

            echo "=== Copying snapshot to prod container ==="
            docker cp oxo-directus-dev:/tmp/schema-snapshot.yaml /tmp/schema-snapshot.yaml
            docker cp /tmp/schema-snapshot.yaml oxo-directus-prod:/tmp/schema-snapshot.yaml

            echo "=== Applying schema diff to Directus prod ==="
            docker exec oxo-directus-prod npx directus schema apply /tmp/schema-snapshot.yaml --yes

            echo "=== Cleaning up ==="
            rm -f /tmp/schema-snapshot.yaml
            docker exec oxo-directus-dev rm -f /tmp/schema-snapshot.yaml
            docker exec oxo-directus-prod rm -f /tmp/schema-snapshot.yaml

            echo "Schema sync complete"

  build-android:
    name: Build Android → ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set Directus URL
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DIRECTUS_URL=https://api.oxo-menus.cedric06nice.com" >> $GITHUB_ENV
          else
            echo "DIRECTUS_URL=https://api.oxo-menus-dev.cedric06nice.com" >> $GITHUB_ENV
          fi

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release --dart-define=DIRECTUS_URL=${{ env.DIRECTUS_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS → ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Set Directus URL
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DIRECTUS_URL=https://api.oxo-menus.cedric06nice.com" >> $GITHUB_ENV
          else
            echo "DIRECTUS_URL=https://api.oxo-menus-dev.cedric06nice.com" >> $GITHUB_ENV
          fi

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --release --no-codesign --dart-define=DIRECTUS_URL=${{ env.DIRECTUS_URL }}
