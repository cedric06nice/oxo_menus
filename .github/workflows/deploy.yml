name: Production Deploy

on:
  push:
    branches: [prod]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter test --coverage --reporter expanded
      - name: Check coverage threshold (75%)
        run: |
          COVERAGE=$(grep -o "LH:[0-9]*" coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          TOTAL=$(grep -o "LF:[0-9]*" coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          PCT=$(awk "BEGIN {printf \"%.2f\", ($COVERAGE/$TOTAL)*100}")
          echo "Coverage: $PCT%"
          if (( $(echo "$PCT < 75.0" | bc -l) )); then
            echo "::error::Coverage $PCT% is below 75% threshold"
            exit 1
          fi

  version:
    name: Version (Semver)
    runs-on: ubuntu-latest
    needs: test
    outputs:
      new_version: ${{ steps.tag.outputs.new_version }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  deploy-web:
    name: Deploy Web (Production)
    runs-on: ubuntu-latest
    needs: version
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: flutter build web --release --build-name=${{ needs.version.outputs.new_version }} --dart-define=DIRECTUS_URL=${{ secrets.DIRECTUS_URL_PROD }}

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          tags: |
            oxo-menus-prod:${{ github.sha }}
            oxo-menus-prod:latest
          outputs: type=docker,dest=image.tar

      - name: Compress Docker image
        run: gzip image.tar -c > image.tar.gz

      - name: Copy image to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: image.tar.gz
          target: /tmp/

      - name: Copy deploy script to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/scripts/blue-green-switch.sh
          target: /tmp/
          strip_components: 2

      - name: Blue/green deploy on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x /tmp/blue-green-switch.sh
            /tmp/blue-green-switch.sh
            rm /tmp/blue-green-switch.sh
            echo "Deployed oxo-menus-prod:${{ github.sha }} (v${{ needs.version.outputs.new_version }})"

  deploy-ios:
    name: Deploy iOS (App Store)
    runs-on: macos-26
    needs: version
    timeout-minutes: 45
    env:
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --release --no-codesign --build-name=${{ needs.version.outputs.new_version }} --build-number=${{ github.run_number }} --dart-define=DIRECTUS_URL=${{ secrets.DIRECTUS_URL_PROD }}

      - name: Install CocoaPods dependencies
        run: bundle exec pod install
        working-directory: ios

      - name: Deploy to App Store
        run: bundle exec fastlane release
        working-directory: ios

  deploy-macos:
    name: Deploy macOS (App Store)
    runs-on: macos-26
    needs: version
    timeout-minutes: 45
    env:
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: macos

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Install certificates and provisioning profiles
        run: bundle exec fastlane install_profiles
        working-directory: macos

      - run: flutter build macos --release --build-name=${{ needs.version.outputs.new_version }} --build-number=${{ github.run_number }} --dart-define=DIRECTUS_URL=${{ secrets.DIRECTUS_URL_PROD }}

      - name: Install CocoaPods dependencies
        run: bundle exec pod install
        working-directory: macos

      - name: Deploy to App Store
        run: bundle exec fastlane release
        working-directory: macos

  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: |
          RELEASES_JSON=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json)
          STABLE_HASH=$(echo "$RELEASES_JSON" | jq -r '.current_release.stable')
          FLUTTER_VERSION=$(echo "$RELEASES_JSON" | jq -r --arg hash "$STABLE_HASH" '.releases[] | select(.hash == $hash) | .version')
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release --build-name=${{ needs.version.outputs.new_version }} --build-number=${{ github.run_number }} --dart-define=DIRECTUS_URL=${{ secrets.DIRECTUS_URL_PROD }}

      - uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, deploy-web, deploy-ios, deploy-macos, build-android]
    steps:
      - uses: actions/checkout@v5

      - name: Download Android APK
        uses: actions/download-artifact@v5
        with:
          name: android-apk
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: v${{ needs.version.outputs.new_version }}
          body: ${{ needs.version.outputs.changelog }}
          files: artifacts/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  export-schema:
    name: Export Directus Schema
    runs-on: ubuntu-latest
    needs: deploy-web
    steps:
      - name: Export schema from prod Directus
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec oxo-directus-prod npx directus schema snapshot /tmp/schema-snapshot.yaml --yes
            docker cp oxo-directus-prod:/tmp/schema-snapshot.yaml /tmp/schema-snapshot.yaml
            docker exec oxo-directus-prod rm -f /tmp/schema-snapshot.yaml

      - name: Download schema from VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: /tmp/schema-snapshot.yaml
          target: ./
          strip_components: 1

      - name: Upload schema as artifact
        uses: actions/upload-artifact@v5
        with:
          name: directus-schema
          path: schema-snapshot.yaml
          retention-days: 90
