name: Production Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/_ci.yml

  version:
    name: Version (Semver)
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      new_version: ${{ steps.tag.outputs.new_version }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build-web:
    needs: version
    uses: ./.github/workflows/_build-web-docker.yml
    with:
      image_name: oxo-menus-prod
      build_version: ${{ needs.version.outputs.new_version }}
    secrets:
      directus_url: ${{ secrets.DIRECTUS_URL_PROD }}

  deploy-web:
    needs: build-web
    uses: ./.github/workflows/_deploy-vps.yml
    with:
      artifact_name: docker-image-oxo-menus-prod
      script_path: deploy/scripts/blue-green-switch.sh
      environment: production
    secrets:
      vps_host: ${{ secrets.VPS_HOST }}
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

  build-apple:
    needs: version
    uses: ./.github/workflows/_build-apple.yml
    with:
      lane: release
      build_version: ${{ needs.version.outputs.new_version }}
      build_number: ${{ github.run_number }}
    secrets:
      directus_url: ${{ secrets.DIRECTUS_URL_PROD }}
      match_git_url: ${{ secrets.MATCH_GIT_URL }}
      match_git_basic_authorization: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      match_password: ${{ secrets.MATCH_PASSWORD }}
      asc_key_id: ${{ secrets.ASC_KEY_ID }}
      asc_issuer_id: ${{ secrets.ASC_ISSUER_ID }}
      asc_key_content: ${{ secrets.ASC_KEY_CONTENT }}

  build-android:
    needs: version
    uses: ./.github/workflows/_build-android.yml
    with:
      build_version: ${{ needs.version.outputs.new_version }}
      build_number: ${{ github.run_number }}
      artifact_name: android-apk
      retention_days: 90
    secrets:
      directus_url: ${{ secrets.DIRECTUS_URL_PROD }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, deploy-web, build-apple, build-android]
    steps:
      - uses: actions/checkout@v5
      - name: Download Android APK
        uses: actions/download-artifact@v5
        with:
          name: android-apk
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: v${{ needs.version.outputs.new_version }}
          body: ${{ needs.version.outputs.changelog }}
          files: artifacts/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  export-schema:
    name: Export Directus Schema
    runs-on: ubuntu-latest
    needs: deploy-web
    steps:
      - name: Export schema from prod Directus
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec oxo-directus-prod npx directus schema snapshot /tmp/schema-snapshot.yaml --yes
            docker cp oxo-directus-prod:/tmp/schema-snapshot.yaml /tmp/schema-snapshot.yaml
            docker exec oxo-directus-prod rm -f /tmp/schema-snapshot.yaml
      - name: Download schema from VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: directus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: /tmp/schema-snapshot.yaml
          target: ./
          strip_components: 1
      - name: Upload schema as artifact
        uses: actions/upload-artifact@v5
        with:
          name: directus-schema
          path: schema-snapshot.yaml
          retention-days: 90
