name: oxo_menus
description: OXO Menus - Template Builder Application
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.8.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  # riverpod: ^3.1.0
  # riverpod_annotation: ^4.0.0
  # state_notifier: ^1.0.0

  # Reflectable (required by directus_api_manager)
  reflectable: ^5.1.0

  # Functional Programming
  # fpdart: ^1.1.0

  # Data Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Directus Integration
  directus_api_manager: ^1.16.1

  # Routing
  go_router: ^17.0.1

  # HTTP & Networking
  http: ^1.2.0
  connectivity_plus: ^7.0.0

  # PDF Generation
  pdf: ^3.10.0
  printing: ^5.12.0

  # Web platform support (for PDF viewer on web)
  web: ^1.1.0

  # UI Components
  # flutter_form_builder: ^10.2.0

  # Image Handling
  # cached_network_image: ^3.3.0

  # Utilities
  equatable: ^2.0.5
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # Secure Storage
  flutter_secure_storage: ^10.0.0
  flutter_web_plugins:
    sdk: flutter
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Testing
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.14.1
  freezed: ^3.2.3
  json_serializable: ^6.9.0
  # riverpod_generator: ^4.0.0+1

  # Linting
  flutter_lints: ^6.0.0

  # Dev Tools
  flutter_launcher_icons: ^0.14.4
  reflectable_builder: ^1.1.0
  fake_async: ^1.3.3

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android:
    generate: true
    image_path: "assets/icon/app_icon.png"
  ios:
    generate: true
    image_path: "assets/icon/app_icon.png"
    remove_alpha_ios: true
  image_path_ios_dark_transparent: "assets/icon/app_icon_dark.png"
  image_path_ios_tinted_grayscale: "assets/icon/app_icon_tinted.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#140C0E"
    theme_color: "#140C0E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_background: "#140C0E"
  adaptive_icon_monochrome: "assets/icon/app_icon_tinted_dark.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    # - family: Schyler
    #   fonts:
    #     - asset: assets/fonts/Schyler-Regular.ttf
    #     - asset: assets/fonts/Schyler-Italic.ttf
    #       style: italic
    - family: Futura
      fonts:
        - asset: assets/fonts/FuturaStd-Light.ttf
        - asset: assets/fonts/FuturaStd-Book.ttf
          weight: 300
        - asset: assets/fonts/FuturaStd-Medium.ttf
          weight: 500
        - asset: assets/fonts/FuturaStd-Bold.ttf
          weight: 700
    - family: LibreBaskerville
      fonts:
        - asset: assets/fonts/LibreBaskerville-Regular.ttf
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
