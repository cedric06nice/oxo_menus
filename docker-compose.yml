version: '3.8'

services:
  # Directus Backend
  directus:
    image: directus/directus:latest
    container_name: oxo_menus_directus
    ports:
      - "8055:8055"
    environment:
      KEY: ${DIRECTUS_KEY:-replace-with-random-value}
      SECRET: ${DIRECTUS_SECRET:-replace-with-random-value}

      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-admin}

      DB_CLIENT: ${DB_CLIENT:-sqlite3}
      DB_FILENAME: ${DB_FILENAME:-/directus/database/data.db}

      WEBSOCKETS_ENABLED: true
      CORS_ENABLED: true
      CORS_ORIGIN: "*"

      PUBLIC_URL: ${DIRECTUS_URL:-http://localhost:8055}
    volumes:
      - directus_data:/directus/database
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    networks:
      - oxo_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8055/server/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # OXO Menus Web App
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DIRECTUS_URL: ${DIRECTUS_URL:-http://directus:8055}
    container_name: oxo_menus_web
    ports:
      - "8080:80"
    depends_on:
      directus:
        condition: service_healthy
    networks:
      - oxo_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  directus_data:
    driver: local
  directus_uploads:
    driver: local
  directus_extensions:
    driver: local

networks:
  oxo_network:
    driver: bridge
