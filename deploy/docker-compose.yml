services:
  # ─── Reverse Proxy (Traefik v3 — automatic TLS) ───
  traefik:
    image: traefik:v3.3
    container_name: oxo-traefik
    restart: unless-stopped
    command:
      - --log.level=INFO
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=oxo-network
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?Set ACME_EMAIL in .env}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    networks:
      - oxo-network

  # ═══════════════════════════════════════════════════
  # PRODUCTION
  # ═══════════════════════════════════════════════════

  # ─── PostgreSQL Production ───
  postgres-prod:
    image: postgres:16-alpine
    container_name: oxo-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PROD_DB_NAME:-directus_prod}
      POSTGRES_USER: ${PROD_DB_USER:-directus}
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD:?Set PROD_DB_PASSWORD in .env}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - oxo-network

  # ─── Directus Production ───
  directus-prod:
    image: directus/directus:11
    container_name: oxo-directus-prod
    restart: unless-stopped
    depends_on:
      - postgres-prod
    environment:
      KEY: ${PROD_DIRECTUS_KEY:?Set PROD_DIRECTUS_KEY in .env}
      SECRET: ${PROD_DIRECTUS_SECRET:?Set PROD_DIRECTUS_SECRET in .env}
      ADMIN_EMAIL: ${PROD_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${PROD_ADMIN_PASSWORD:?Set PROD_ADMIN_PASSWORD in .env}
      PUBLIC_URL: https://${DOMAIN_API_PROD:-api.your-app.example.com}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://${DOMAIN_FLUTTER_PROD:-your-app.example.com}"
      WEBSOCKETS_ENABLED: "true"
      DB_CLIENT: pg
      DB_HOST: postgres-prod
      DB_PORT: 5432
      DB_DATABASE: ${PROD_DB_NAME:-directus_prod}
      DB_USER: ${PROD_DB_USER:-directus}
      DB_PASSWORD: ${PROD_DB_PASSWORD}
      SCHEMA_SYNC: IMPORT
    volumes:
      - directus-prod-uploads:/directus/uploads
      - directus-prod-extensions:/directus/extensions
      - directus-schema-sync:/directus/schema-sync
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.directus-prod.rule=Host(`${DOMAIN_API_PROD}`)"
      - "traefik.http.routers.directus-prod.entrypoints=websecure"
      - "traefik.http.routers.directus-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.directus-prod.loadbalancer.server.port=8055"
    networks:
      - oxo-network

  # ─── Flutter Web Production — Blue Slot ───
  oxo-menus-blue:
    image: oxo-menus-prod:latest
    container_name: oxo-menus-blue
    restart: unless-stopped
    labels:
      - "traefik.enable=${BLUE_ENABLED:-true}"
      - "traefik.http.routers.oxo-blue.rule=Host(`${DOMAIN_FLUTTER_PROD}`)"
      - "traefik.http.routers.oxo-blue.entrypoints=websecure"
      - "traefik.http.routers.oxo-blue.tls.certresolver=letsencrypt"
      - "traefik.http.services.oxo-blue.loadbalancer.server.port=80"
    networks:
      - oxo-network

  # ─── Flutter Web Production — Green Slot ───
  oxo-menus-green:
    image: oxo-menus-prod:latest
    container_name: oxo-menus-green
    restart: unless-stopped
    labels:
      - "traefik.enable=${GREEN_ENABLED:-false}"
      - "traefik.http.routers.oxo-green.rule=Host(`${DOMAIN_FLUTTER_PROD}`)"
      - "traefik.http.routers.oxo-green.entrypoints=websecure"
      - "traefik.http.routers.oxo-green.tls.certresolver=letsencrypt"
      - "traefik.http.services.oxo-green.loadbalancer.server.port=80"
    networks:
      - oxo-network

  # ═══════════════════════════════════════════════════
  # DEV
  # ═══════════════════════════════════════════════════

  # ─── PostgreSQL Dev ───
  postgres-dev:
    image: postgres:16-alpine
    container_name: oxo-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DEV_DB_NAME:-directus_dev}
      POSTGRES_USER: ${DEV_DB_USER:-directus}
      POSTGRES_PASSWORD: ${DEV_DB_PASSWORD:?Set DEV_DB_PASSWORD in .env}
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - oxo-network

  # ─── Directus Dev ───
  directus-dev:
    image: directus/directus:11
    container_name: oxo-directus-dev
    restart: unless-stopped
    depends_on:
      - postgres-dev
    environment:
      KEY: ${DEV_DIRECTUS_KEY:?Set DEV_DIRECTUS_KEY in .env}
      SECRET: ${DEV_DIRECTUS_SECRET:?Set DEV_DIRECTUS_SECRET in .env}
      ADMIN_EMAIL: ${DEV_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:?Set DEV_ADMIN_PASSWORD in .env}
      PUBLIC_URL: https://${DOMAIN_API_DEV:-api.your-app-dev.example.com}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "regex:^https://(pr-\\d+\\.)?${DOMAIN_FLUTTER_PROD}$$"
      WEBSOCKETS_ENABLED: "true"
      DB_CLIENT: pg
      DB_HOST: postgres-dev
      DB_PORT: 5432
      DB_DATABASE: ${DEV_DB_NAME:-directus_dev}
      DB_USER: ${DEV_DB_USER:-directus}
      DB_PASSWORD: ${DEV_DB_PASSWORD}
      SCHEMA_SYNC: EXPORT
    volumes:
      - directus-dev-uploads:/directus/uploads
      - directus-dev-extensions:/directus/extensions
      - directus-schema-sync:/directus/schema-sync
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.directus-dev.rule=Host(`${DOMAIN_API_DEV}`)"
      - "traefik.http.routers.directus-dev.entrypoints=websecure"
      - "traefik.http.routers.directus-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.directus-dev.loadbalancer.server.port=8055"
    networks:
      - oxo-network

volumes:
  postgres-prod-data:
  postgres-dev-data:
  directus-prod-uploads:
  directus-prod-extensions:
  directus-dev-uploads:
  directus-dev-extensions:
  directus-schema-sync:
  traefik-acme:

networks:
  oxo-network:
    external: true
