# IMPORTANT: Replace all example.com domains with your actual domains
# Also update the SSL certificate paths to match your domain names.

# ─── Redirect all HTTP → HTTPS ───
server {
    listen 80;
    server_name
        your-app.example.com
        your-app-dev.example.com
        api.your-app.example.com
        api.your-app-dev.example.com;
    return 301 https://$host$request_uri;
}

# ─── Flutter Production: https://your-app.example.com ───
server {
    listen 443 ssl;
    server_name your-app.example.com;

    ssl_certificate /etc/letsencrypt/live/your-app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-app.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_prod http://oxo-menus-prod:80;
        proxy_pass $upstream_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Flutter Dev: https://your-app-dev.example.com ───
server {
    listen 443 ssl;
    server_name your-app-dev.example.com;

    ssl_certificate /etc/letsencrypt/live/your-app-dev.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-app-dev.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_staging http://oxo-menus-staging:80;
        proxy_pass $upstream_staging;
        proxy_set_header Host $host;
