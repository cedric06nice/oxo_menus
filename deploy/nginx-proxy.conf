# ─── Directus Production: https://api.your-app.example.com ───
server {
    listen 443 ssl;
    server_name api.your-app.example.com;

    ssl_certificate /etc/letsencrypt/live/api.your-app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-app.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 100M;

    location / {
        # Normalize double slashes (defense-in-depth for client-side URL bugs)
        rewrite ^(.*?)//+(.*)$ $1/$2 break;

        # ── CORS ──
        # Strip Directus CORS headers to avoid duplicates (Directus has CORS_ENABLED=true)
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # Handle preflight (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://your-app.example.com' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }

        # CORS headers on actual responses (GET, POST, etc.)
        add_header 'Access-Control-Allow-Origin' 'https://your-app.example.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        resolver 127.0.0.11 valid=30s;
        set $upstream_directus_prod http://directus-prod:8055;
        proxy_pass $upstream_directus_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Directus realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

