# ─── Redirect all HTTP → HTTPS ───
server {
    listen 80;
    server_name
        oxo-menus.cedric06nice.com
        oxo-menus-dev.cedric06nice.com
        api.oxo-menus.cedric06nice.com
        api.oxo-menus-dev.cedric06nice.com;
    return 301 https://$host$request_uri;
}

# ─── Flutter Production: https://oxo-menus.cedric06nice.com ───
server {
    listen 443 ssl;
    server_name oxo-menus.cedric06nice.com;

    ssl_certificate /etc/letsencrypt/live/oxo-menus.cedric06nice.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oxo-menus.cedric06nice.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_prod http://oxo-menus-prod:80;
        proxy_pass $upstream_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

