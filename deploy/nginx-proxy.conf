# ─── Directus Production: https://api.oxo-menus.cedric06nice.com ───
server {
    listen 443 ssl;
    server_name api.oxo-menus.cedric06nice.com;

    ssl_certificate /etc/letsencrypt/live/api.oxo-menus.cedric06nice.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.oxo-menus.cedric06nice.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 100M;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_directus_prod http://directus-prod:8055;
        proxy_pass $upstream_directus_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Directus realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

